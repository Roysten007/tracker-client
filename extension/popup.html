<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Sprint Machine</title>
    <style>
      :root {
        --navy-950: #06063E;
        --royal-800: #0A0A78;
        --royal-100: #E9EAFB;
        --ink: #14152E;
        --hint: #6A6E8C;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 18px;
        width: 260px;
        background: #ffffff;
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .head {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .badge {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--royal-800);
        color: #fff;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
      }
      h1 { margin: 0; font-size: 16px; color: var(--navy-950); }
      .status {
        margin: 12px 0;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 12px;
        background: var(--royal-100);
        color: var(--navy-950);
      }
      .status.ko { background: #fef2f2; color: #7a1a1a; }
      a.btn {
        display: block;
        margin-top: 8px;
        text-align: center;
        padding: 10px;
        border-radius: 10px;
        background: var(--royal-800);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        font-size: 13px;
      }
      a.link {
        display: block;
        margin-top: 8px;
        text-align: center;
        font-size: 12px;
        color: var(--hint);
      }
    </style>
  </head>
  <body>
    <div class="head">
      <div class="badge">SM</div>
      <h1>Sprint Machine</h1>
    </div>

    <div id="status" class="status">Chargement…</div>

    <a id="appLink" class="btn" href="#" target="_blank" rel="noopener noreferrer">Ouvrir l'app</a>
    <a class="link" href="options.html" target="_blank">Modifier l'URL de l'app</a>

    <script src="browser-polyfill.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
